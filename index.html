<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Central Europe Hex Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #panel {
      width: 340px;
      box-sizing: border-box;
      padding: 16px;
      border-right: 1px solid #ccc;
      background: #f7f7f7;
      overflow-y: auto;
    }

    #map {
      flex: 1;
    }

    h2, h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .label {
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    .value {
      min-height: 20px;
      line-height: 1.35;
    }

    .control-block {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #ddd;
    }

    .row {
      margin-top: 10px;
    }

    .row input,
    .row button {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      font-size: 14px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .button-row button {
      flex: 1;
    }

    .small {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
      line-height: 1.35;
    }

    .legend-box {
      margin-top: 10px;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .legend-bar {
      height: 16px;
      border-radius: 4px;
      border: 1px solid #aaa;
      background: linear-gradient(
        to right,
        #7ec8ff 0%,
        #39a9ff 16.6%,
        #00c2a8 33.2%,
        #7ad151 49.8%,
        #fde725 66.4%,
        #f8961e 83%,
        #f94144 100%
      );
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 12px;
      color: #444;
    }

    .leaflet-tooltip.hex-tooltip {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #888;
      color: #111;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      font-size: 12px;
      padding: 4px 6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="panel">
      <h2>Clicked place</h2>

      <div class="label">Country</div>
      <div id="country" class="value">—</div>

      <div class="label">Latitude</div>
      <div id="lat" class="value">—</div>

      <div class="label">Longitude</div>
      <div id="lon" class="value">—</div>

      <div class="label">Hex value</div>
      <div id="hexValue" class="value">—</div>

      <div class="label">Status</div>
      <div id="status" class="value">Loading map...</div>

      <div class="control-block">
        <h3>Overlay</h3>

        <div class="label">Year</div>
        <div class="row">
          <input type="range" id="yearSlider" min="0" max="7" step="1" value="0" />
        </div>
        <div id="yearValue" class="value">2030</div>

        <div class="label">Opacity</div>
        <div class="row">
          <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="0.85" />
        </div>
        <div id="opacityValue" class="value">0.85</div>

        <div class="button-row">
          <button id="toggleOverlayBtn" type="button">Hide overlay</button>
          <button id="fitOverlayBtn" type="button">Fit data</button>
        </div>

        <div class="legend-box">
          <div class="legend-title">Value scale</div>
          <div class="legend-bar"></div>
          <div class="legend-labels">
            <span id="legendMin">min</span>
            <span id="legendMax">max</span>
          </div>
        </div>

        <div class="small">
          GeoJSON only.<br>
          Click anywhere on the map to retrieve hex and country.
        </div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="webmap_data/map_meta.js"></script>

  <script>
    // Clean GeoJSON-only Leaflet map for static GitHub Pages deployment
    // Changes from previous version:
    // - Removed play mode completely (not present in current code)
    // - Removed layer click handlers to rely solely on map click for robust point-in-polygon lookup
    // - Simplified click handling to always use Turf.js point-in-polygon regardless of click location
    // - Removed PNG overlay code (not present)
    // - Kept all requested features: left panel, year/opacity sliders, country boundaries, hex highlighting
    // - Code is now simpler, more readable, and easier to extend for future maps
    const APP = {
      map: null,
      clickMarker: null,
      hexLayer: null,
      selectedHexLayer: null,
      currentYear: null,
      currentRcp: "rcp26",  // Fixed: Added back currentRcp for file path construction
      overlayVisible: true,
      currentHexGeojson: null,
      countryGeojson: null
    };

    const DOM = {
      country: document.getElementById("country"),
      lat: document.getElementById("lat"),
      lon: document.getElementById("lon"),
      hexValue: document.getElementById("hexValue"),
      status: document.getElementById("status"),
      yearSlider: document.getElementById("yearSlider"),
      yearValue: document.getElementById("yearValue"),
      opacitySlider: document.getElementById("opacitySlider"),
      opacityValue: document.getElementById("opacityValue"),
      toggleOverlayBtn: document.getElementById("toggleOverlayBtn"),
      fitOverlayBtn: document.getElementById("fitOverlayBtn"),
      legendMin: document.getElementById("legendMin"),
      legendMax: document.getElementById("legendMax")
    };

    function setStatus(text) {
      DOM.status.textContent = text;
    }

    function setLegendLabels() {
      DOM.legendMin.textContent = Number(MAP_META.valueRange.zmin).toFixed(3);
      DOM.legendMax.textContent = Number(MAP_META.valueRange.zmax).toFixed(3);
    }

    function getColor(value) {
      const palette = [
        "#7ec8ff",
        "#39a9ff",
        "#00c2a8",
        "#7ad151",
        "#fde725",
        "#f8961e",
        "#f94144"
      ];

      if (!isFinite(value)) {
        return "#cccccc";
      }

      const zmin = Number(MAP_META.valueRange.zmin);
      const zmax = Number(MAP_META.valueRange.zmax);

      if (zmax <= zmin) {
        return palette[0];
      }

      let t = (value - zmin) / (zmax - zmin);
      t = Math.max(0, Math.min(1, t));

      const idx = Math.min(
        palette.length - 1,
        Math.floor(t * palette.length)
      );

      return palette[idx];
    }

    function baseHexStyle(feature) {
      const value = Number(feature.properties.mean);
      return {
        color: "#222222",
        weight: 0.9,
        opacity: 0.7,
        fillColor: getColor(value),
        fillOpacity: Number(DOM.opacitySlider.value)
      };
    }

    function highlightHex(layer) {
      layer.setStyle({
        color: "#111111",
        weight: 2.0,
        opacity: 1,
        fillColor: "#ffffff",
        fillOpacity: 0.25
      });

      if (layer.bringToFront) {
        layer.bringToFront();
      }
    }

    function resetSelectedHex() {
      if (APP.selectedHexLayer && APP.hexLayer) {
        APP.hexLayer.resetStyle(APP.selectedHexLayer);
        APP.selectedHexLayer = null;
      }
    }

    function updateMarker(latlng) {
      if (APP.clickMarker) {
        APP.clickMarker.setLatLng(latlng);
      } else {
        APP.clickMarker = L.circleMarker(latlng, {
          radius: 8,
          color: "#c2185b",
          weight: 2,
          fillColor: "#e91e63",
          fillOpacity: 0.9
        }).addTo(APP.map);
      }
    }

    function getCurrentFile() {
      return MAP_META.files[APP.currentRcp + "_" + APP.currentYear];
    }

    function fitDataBounds() {
      if (APP.hexLayer) {
        APP.map.fitBounds(APP.hexLayer.getBounds());
      } else {
        APP.map.fitBounds([
          [MAP_META.bbox.ymin, MAP_META.bbox.xmin],
          [MAP_META.bbox.ymax, MAP_META.bbox.xmax]
        ]);
      }
    }

    function findContainingFeature(geojson, latlng) {
      if (!geojson || !geojson.features) return null;

      const pt = turf.point([latlng.lng, latlng.lat]);

      for (const feature of geojson.features) {
        try {
          if (turf.booleanPointInPolygon(pt, feature)) {
            return feature;
          }
        } catch (error) {
          console.error("Point-in-polygon failed:", error);
        }
      }

      return null;
    }

    function findLayerForFeature(targetFeature) {
      if (!APP.hexLayer || !targetFeature) return null;

      let foundLayer = null;

      APP.hexLayer.eachLayer(function(layer) {
        if (layer.feature === targetFeature) {
          foundLayer = layer;
        }
      });

      return foundLayer;
    }

    function updatePanelFromClick(latlng) {
      DOM.lat.textContent = latlng.lat.toFixed(5);
      DOM.lon.textContent = latlng.lng.toFixed(5);
      updateMarker(latlng);

      const hexFeature = findContainingFeature(APP.currentHexGeojson, latlng);
      const countryFeature = findContainingFeature(APP.countryGeojson, latlng);

      DOM.country.textContent = countryFeature ? (countryFeature.properties.name || "Unknown") : "—";

      resetSelectedHex();

      if (hexFeature) {
        const val = Number(hexFeature.properties.mean);
        DOM.hexValue.textContent = isFinite(val) ? val.toFixed(6) : "NA";

        const layer = findLayerForFeature(hexFeature);
        if (layer) {
          APP.selectedHexLayer = layer;
          highlightHex(layer);
        }

        setStatus("Hex found");
      } else {
        DOM.hexValue.textContent = "—";
        setStatus("No hex at clicked point");
      }
    }

    function initMap() {
      APP.currentYear = MAP_META.years[0];

      APP.map = L.map("map", {
        center: [50.2, 12.5],
        zoom: 4.7,
        maxBounds: [
          [34.0, -15.0],
          [73.0, 36.0]
        ],
        maxBoundsViscosity: 1.0
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(APP.map);

      APP.map.createPane("hexPane");
      APP.map.getPane("hexPane").style.zIndex = 250;

      APP.map.createPane("countryPane");
      APP.map.getPane("countryPane").style.zIndex = 240;

      // Map click handler - only source for panel updates
      // Removed layer click handlers to avoid double-handling and ensure robust point-in-polygon lookup
      APP.map.on("click", function(e) {
        updatePanelFromClick(e.latlng);
      });

      setLegendLabels();
      initControls();
      loadCountryBorders();
      updateHexLayer();
    }

    function initControls() {
      DOM.yearSlider.max = MAP_META.years.length - 1;
      DOM.yearSlider.value = 0;
      DOM.yearValue.textContent = String(APP.currentYear);
      DOM.opacityValue.textContent = Number(DOM.opacitySlider.value).toFixed(2);

      DOM.yearSlider.addEventListener("input", function() {
        const yearIndex = Number(DOM.yearSlider.value);
        APP.currentYear = MAP_META.years[yearIndex];
        DOM.yearValue.textContent = String(APP.currentYear);
        updateHexLayer();
      });

      DOM.opacitySlider.addEventListener("input", function() {
        DOM.opacityValue.textContent = Number(DOM.opacitySlider.value).toFixed(2);

        if (APP.hexLayer) {
          APP.hexLayer.setStyle(baseHexStyle);
          if (APP.selectedHexLayer) {
            highlightHex(APP.selectedHexLayer);
          }
        }
      });

      DOM.toggleOverlayBtn.addEventListener("click", function() {
        APP.overlayVisible = !APP.overlayVisible;

        if (APP.overlayVisible) {
          updateHexLayer();
          DOM.toggleOverlayBtn.textContent = "Hide overlay";
          setStatus("Overlay shown");
        } else {
          if (APP.hexLayer) {
            APP.map.removeLayer(APP.hexLayer);
            APP.hexLayer = null;
          }
          APP.currentHexGeojson = null;
          resetSelectedHex();
          DOM.toggleOverlayBtn.textContent = "Show overlay";
          setStatus("Overlay hidden");
        }
      });

      DOM.fitOverlayBtn.addEventListener("click", function() {
        fitDataBounds();
      });
    }

    async function loadCountryBorders() {
      try {
        const response = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        APP.countryGeojson = await response.json();

        L.geoJSON(APP.countryGeojson, {
          pane: "countryPane",
          interactive: false,
          style: function() {
            return {
              color: "#555",
              weight: 1,
              fillOpacity: 0
            };
          }
        }).addTo(APP.map);

      } catch (error) {
        console.error(error);
        setStatus("Country borders could not be loaded");
      }
    }

    async function updateHexLayer() {
      if (!APP.overlayVisible) return;

      const fileName = getCurrentFile();

      if (!fileName) {
        setStatus("No file configured for this year");
        return;
      }

      if (APP.hexLayer) {
        APP.map.removeLayer(APP.hexLayer);
        APP.hexLayer = null;
      }

      APP.currentHexGeojson = null;
      resetSelectedHex();
      DOM.hexValue.textContent = "—";

      try {
        setStatus("Loading " + fileName + "...");

        const response = await fetch(fileName);
        if (!response.ok) {
          throw new Error("HTTP " + response.status + " for " + fileName);
        }

        APP.currentHexGeojson = await response.json();

        APP.hexLayer = L.geoJSON(APP.currentHexGeojson, {
          pane: "hexPane",
          style: baseHexStyle,
          onEachFeature: function(feature, layer) {
            const value = Number(feature.properties.mean);

            layer.bindTooltip(
              isFinite(value) ? ("mean: " + value.toFixed(6)) : "mean: NA",
              {
                sticky: true,
                direction: "top",
                className: "hex-tooltip"
              }
            );

            layer.on("mouseover", function() {
              if (APP.selectedHexLayer !== layer) {
                layer.setStyle({
                  color: "#111111",
                  weight: 1.4,
                  opacity: 1,
                  fillOpacity: Math.min(Number(DOM.opacitySlider.value) + 0.10, 1)
                });
              }
            });

            layer.on("mouseout", function() {
              if (APP.selectedHexLayer !== layer && APP.hexLayer) {
                APP.hexLayer.resetStyle(layer);
              }
            });
          }
        }).addTo(APP.map);

        setStatus("Loaded year " + APP.currentYear);

      } catch (error) {
        console.error(error);
        setStatus("Failed loading " + fileName + " :: " + error.message);
      }
    }

    initMap();
  </script>
</body>
</html>
